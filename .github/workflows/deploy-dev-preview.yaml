name: Deploy dev PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

env:
  PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
  PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
  VITE_ADAPTER: static
  STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
  PUBLIC_ORIGIN: ${{ vars.PUBLIC_ORIGIN_DEV }}
  PUBLIC_DISABLE_PAYWALL: ${{ vars.PUBLIC_DISABLE_PAYWALL }}

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        if: github.event.action != 'closed'
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        if: github.event.action != 'closed'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: github.event.action != 'closed'
        run: VITE_BASE_URL="/preview/pr-${{ github.event.number }}" pnpm build

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build
          umbrella-dir: /preview
          pages-base-url: dev.kalkul.app
