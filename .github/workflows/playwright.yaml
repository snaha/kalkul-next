name: Playwright Tests

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '**'

jobs:
  e2e-tests:
    name: E2E Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Cache Supabase CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: ${{ runner.os }}-supabase-cli-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-supabase-cli-

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: ~/.cache/docker-images
          key: ${{ runner.os }}-supabase-docker-v3-${{ hashFiles('supabase/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-supabase-docker-v3-

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          echo "Loading cached Docker images..."
          if [ -d "$HOME/.cache/docker-images" ]; then
            for image in $HOME/.cache/docker-images/*.tar; do
              if [ -f "$image" ]; then
                echo "Loading $(basename "$image")"
                docker load -i "$image"
              fi
            done
            echo "Finished loading cached images"
          else
            echo "No cached images directory found"
          fi

      - name: Start Supabase local development setup
        run: pnpm supabase start

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          echo "Saving Docker images to cache..."
          mkdir -p $HOME/.cache/docker-images

          # Get all supabase and related images
          docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "(supabase|postgrest|kong|inbucket)" | while read image; do
            if [ "$image" != "<none>:<none>" ]; then
              filename=$(echo "$image" | tr '/' '_' | tr ':' '_')
              echo "Saving $image as $filename.tar"
              docker save "$image" -o "$HOME/.cache/docker-images/$filename.tar"
            fi
          done

          echo "Docker images saved to cache:"
          ls -la $HOME/.cache/docker-images/

      - name: Run Playwright tests
        run: pnpm test:integration
        env:
          CI: true
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_ORIGIN: ${{ vars.PUBLIC_ORIGIN }}
          PUBLIC_DISABLE_PAYWALL: ${{ vars.PUBLIC_DISABLE_PAYWALL }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop Supabase
        if: always()
        run: pnpm supabase stop
